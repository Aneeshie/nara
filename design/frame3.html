<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&family=Fira+Code:wght@300..700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
        --font-family-mono: var(--font-mono);
      }
      :root { --background: #0B0B0B;
        --foreground: #E5E5E5;
        --primary: #FFFFFF;
        --primary-foreground: #0B0B0B;
        --secondary: #1C1C1C;
        --secondary-foreground: #E5E5E5;
        --tertiary: #10B981;
        --muted: #161616;
        --muted-foreground: #707070;
        --accent: #38BDF8;
        --accent-foreground: #E5E5E5;
        --card: #121212;
        --card-foreground: #E5E5E5;
        --destructive: #EF4444;
        --border: #1A1A1A;
        --input: #1F1F1F;
        --ring: #38BDF8;
        --radius: 8px;
        --font-sans: Geist, Inter, sans-serif;
        --font-heading: Geist, Inter, sans-serif;
        --font-mono: JetBrains Mono, monospace;
        --shadow-offset-x: 0;
        --shadow-offset-y: 10;
        --shadow-blur: 30;
        --shadow-spread: -8;
        --shadow-color: rgba(15, 23, 42, 0.12); }
    </style>
    <style>
      .brand-gradient { background-image: linear-gradient(135deg, var(--primary), var(--accent)); }
      .shadow-theme {
        box-shadow:
          calc(var(--shadow-offset-x, 0) * 1px) calc(var(--shadow-offset-y, 10) * 1px)
          calc(var(--shadow-blur, 30) * 1px) calc(var(--shadow-spread, -8) * 1px)
          var(--shadow-color, rgba(15, 23, 42, 0.12));
      }
    </style>
  </head>
  <body>
<div class="min-h-screen w-full bg-background flex flex-col relative font-sans text-foreground select-none overflow-hidden">

  <!-- Title Bar (Native macOS Style) -->
  <header class="h-11 border-b border-border bg-background flex items-center justify-between px-4 shrink-0">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-red-500 opacity-80 hover:opacity-100 transition-opacity cursor-pointer"></span>
        <span class="w-3 h-3 rounded-full bg-yellow-500 opacity-80 hover:opacity-100 transition-opacity cursor-pointer"></span>
        <span class="w-3 h-3 rounded-full bg-green-500 opacity-80 hover:opacity-100 transition-opacity cursor-pointer"></span>
      </div>
      <div class="flex items-center gap-2 ml-4">
        <span class="text-xs font-semibold tracking-wider text-muted-foreground font-heading">NARA</span>
        <span class="text-[10px] px-1.5 py-0.5 rounded bg-muted text-muted-foreground font-mono">v0.8.2</span>
      </div>
    </div>

    <div class="flex items-center gap-2 px-3 py-1 bg-muted/50 rounded-md border border-border/60">
      <iconify-icon icon="lucide:layers" class="text-xs text-muted-foreground"></iconify-icon>
      <span class="text-xs text-muted-foreground font-medium">Workspace: <span class="text-foreground">Aneeshie</span></span>
    </div>

    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1 text-[11px] text-muted-foreground bg-muted px-2 py-0.5 rounded border border-border/80">
        <span class="font-sans">⌘⇧P</span>
      </div>
      <button class="p-1 text-muted-foreground hover:text-foreground hover:bg-muted rounded transition-colors" title="Settings">
        <iconify-icon icon="lucide:settings" class="text-base"></iconify-icon>
      </button>
    </div>
  </header>

  <!-- Empty Tabs Bar -->
  <nav class="h-10 bg-background/80 border-b border-border flex items-center justify-between px-2 shrink-0">
    <div class="flex items-center gap-1 h-full">
      <span class="text-xs text-muted-foreground/60 px-3 font-medium">No active sessions</span>
      <!-- Add New Tab Button -->
      <button class="p-1.5 hover:bg-muted text-muted-foreground hover:text-foreground rounded transition-colors" title="New Tab (⌘T)">
        <iconify-icon icon="lucide:plus" class="text-sm"></iconify-icon>
      </button>
    </div>
  </nav>

  <!-- Main Empty State Area -->
  <main class="flex-1 p-3 bg-background flex flex-col min-h-0 justify-center items-center">

    <div class="text-center max-w-sm px-6">
      <!-- Minimal Nara Logo Symbol -->
      <div class="w-12 h-12 rounded-xl bg-card border border-border flex items-center justify-center mx-auto mb-6 shadow-md">
        <span class="text-lg font-bold tracking-wider text-accent font-heading">N</span>
      </div>

      <h2 class="text-lg font-bold font-heading text-foreground mb-1">Nara Terminal</h2>
      <p class="text-xs text-muted-foreground mb-8">A premium, keyboard-first development workspace.</p>

      <!-- Keyboard Shortcuts Hints -->
      <div class="space-y-3 text-left bg-card border border-border rounded-lg p-4 font-mono text-xs">

        <div class="flex items-center justify-between">
          <span class="text-muted-foreground">New Terminal Tab</span>
          <span class="bg-muted px-2 py-0.5 rounded text-foreground border border-border text-[11px]">⌘T</span>
        </div>

        <div class="flex items-center justify-between">
          <span class="text-muted-foreground">Close Terminal Tab</span>
          <span class="bg-muted px-2 py-0.5 rounded text-foreground border border-border text-[11px]">⌘W</span>
        </div>

        <div class="flex items-center justify-between">
          <span class="text-muted-foreground">Command Palette</span>
          <span class="bg-muted px-2 py-0.5 rounded text-foreground border border-border text-[11px]">⌘⇧P</span>
        </div>

        <div class="flex items-center justify-between">
          <span class="text-muted-foreground">Open Settings</span>
          <span class="bg-muted px-2 py-0.5 rounded text-foreground border border-border text-[11px]">⌘,</span>
        </div>

      </div>

      <!-- Quick Action Button -->
      <button class="mt-6 px-4 py-2 bg-primary text-primary-foreground text-xs font-semibold rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2 mx-auto shadow-sm">
        <iconify-icon icon="lucide:plus" class="text-sm"></iconify-icon>
        <span>Create Terminal</span>
      </button>
    </div>

  </main>

  <!-- Status Bar -->
  <footer class="h-7 bg-background border-t border-border flex items-center justify-between px-4 shrink-0 text-xs text-muted-foreground font-mono">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-muted-foreground/40"></span>
        <span>no shell</span>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <span>UTF-8</span>
      <span class="text-muted-foreground/30">|</span>
      <span>LF</span>
      <span class="text-muted-foreground/30">|</span>
      <span class="text-muted-foreground">Offline</span>
    </div>
  </footer>

</div>
</body></html>
